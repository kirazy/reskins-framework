[mod-name]
reskins-framework=Artisanal Reskins: Framework

[mod-description]
reskins-framework=Serves as the core for the Artisanal Reskins mods. Provides the framework for global state management, user preferences, and other configuration settings.

[mod-setting-name]
reskins-framework-show-tier-labels=Show tier labels
reskins-framework-show-tier-labels-on-pipes=Show tier labels on pipes
reskins-framework-tier-label-style=Tier label style
reskins-framework-tier-mapping=Tier mapping
reskins-framework-use-custom-tier-colors=Use custom tier colors
reskins-framework-custom-colors-tier-0=Color: Tier 0
reskins-framework-custom-colors-tier-1=Color: Tier 1
reskins-framework-custom-colors-tier-2=Color: Tier 2
reskins-framework-custom-colors-tier-3=Color: Tier 3
reskins-framework-custom-colors-tier-4=Color: Tier 4
reskins-framework-custom-colors-tier-5=Color: Tier 5
reskins-framework-custom-colors-tier-6=Color: Tier 6

[mod-setting-description]
reskins-framework-show-tier-labels=Displays colored tier indicators on icons.
reskins-framework-show-tier-labels-on-pipes=Displays colored tier indicators on pipe and pipe-adjacent icons\n\nHas no effect if [font=default-semibold]Show tier labels[/font] is not enabled.
reskins-framework-tier-label-style=Sets the style of tier label.
reskins-framework-tier-mapping=Sets how tiers are mapped for structures and items.\n\n[font=default-semibold]Traditional[/font]: tier mapping follows the names. Entries 1, 2, and 3 in a series maps to tiers 1, 2, and 3, and so on.\nFor example, nuclear reactors starting at tier 1.\n\n[font=default-semibold]Progression[/font]: tier mapping follows game progression. Items obtained later, requiring more complex materials, start mapped to higher tiers.\nFor example, nuclear reactors starting at tier 3.
reskins-framework-use-custom-tier-colors=[img=utility.warning_icon] Custom colors makes extensive use of sprite layers for items and entities, dramatically increasing the number of sprites on-screen. This may have negative performance impacts.\n\nEnable customization of tier colors as chosen by the below color pickers.
reskins-framework-custom-colors-tier-0=Sets color for Tier 0.
reskins-framework-custom-colors-tier-1=Sets color for Tier 1.
reskins-framework-custom-colors-tier-2=Sets color for Tier 2.
reskins-framework-custom-colors-tier-3=Sets color for Tier 3.
reskins-framework-custom-colors-tier-4=Sets color for Tier 4.
reskins-framework-custom-colors-tier-5=Sets color for Tier 5.
reskins-framework-custom-colors-tier-6=Sets color for Tier 6.

